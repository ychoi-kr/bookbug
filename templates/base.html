<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}bookbug{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    [data-bs-theme="dark"] body { background: #212529; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .issue-row:hover { background: #f0f4ff; cursor: pointer; }
    [data-bs-theme="dark"] .issue-row:hover { background: #2c3e50; }
    .badge-status, .badge-severity { font-size: .75rem; }
    .filter-bar { background: #fff; border-bottom: 1px solid #dee2e6; }
    [data-bs-theme="dark"] .filter-bar { background: #2b3035; border-bottom-color: #495057; }
    .field-label { font-size: .75rem; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; }
    /* 타임라인 */
    .timeline { position: relative; }
    .tl-item  { display: flex; gap: .75rem; }
    .tl-gutter { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 16px; padding-top: .2rem; }
    .tl-dot  { width: 10px; height: 10px; border-radius: 50%; background: #adb5bd; border: 2px solid #fff; box-shadow: 0 0 0 1px #adb5bd; flex-shrink: 0; }
    .tl-line { flex: 1; width: 2px; background: #dee2e6; margin-top: 4px; }
    .tl-body { flex: 1; }
    .tl-block { white-space: pre-wrap; word-break: break-word; padding: .4rem .6rem; border-radius: .25rem; }
    .tl-block-old { background: #fff5f5; border-left: 3px solid #f5c2c7; color: #842029; }
    .tl-block-new { background: #f0fff4; border-left: 3px solid #a3cfbb; color: #0a3622; }
    [data-bs-theme="dark"] .tl-dot  { border-color: #212529; }
    [data-bs-theme="dark"] .tl-line { background: #495057; }
    [data-bs-theme="dark"] .tl-block-old { background: #2c1215; border-left-color: #842029; color: #f5c2c7; }
    [data-bs-theme="dark"] .tl-block-new { background: #051b11; border-left-color: #0a3622; color: #a3cfbb; }
    .tl-toggle-icon { transition: transform .2s; display: inline-block; font-size: .7rem; }
    .card-header[aria-expanded="true"] .tl-toggle-icon { transform: rotate(90deg); }
    textarea { font-family: inherit; }
    .stat-card { min-width: 80px; text-align: center; }
    .stat-num  { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .stat-lbl  { font-size: .7rem; color: #6c757d; }
    #theme-btn { font-size: .85rem; padding: .25rem .6rem; }
  </style>
  <script>
    // 페이지 로드 전 테마 적용 (깜빡임 방지)
    (function() {
      const saved = localStorage.getItem('bb-theme') || 'auto';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const dark = saved === 'dark' || (saved === 'auto' && prefersDark);
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-0">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🐛 bookbug</a>
    <div class="navbar-nav ms-auto align-items-center gap-2">
      <a class="nav-link" href="/">프로젝트</a>
      <button id="theme-btn" class="btn btn-outline-secondary btn-sm" title="테마 전환"></button>
    </div>
  </div>
</nav>
<div class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const ICONS = { light: '☀️ 라이트', dark: '🌙 다크', auto: '🖥️ 시스템' };
  const CYCLE = { light: 'dark', dark: 'auto', auto: 'light' };

  function applyTheme(mode) {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const dark = mode === 'dark' || (mode === 'auto' && prefersDark);
    document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = ICONS[mode];
  }

  let currentMode = localStorage.getItem('bb-theme') || 'auto';
  applyTheme(currentMode);

  document.getElementById('theme-btn').addEventListener('click', function() {
    currentMode = CYCLE[currentMode];
    localStorage.setItem('bb-theme', currentMode);
    applyTheme(currentMode);
  });

  // 시스템 테마 변경 실시간 반영 (auto 모드일 때)
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (localStorage.getItem('bb-theme') === 'auto') applyTheme('auto');
  });
</script>
{% block scripts %}{% endblock %}
<script>
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const text = btn.dataset.copy;
  function showCheck() {
    const icon = btn.querySelector('i');
    icon.className = 'bi bi-clipboard-check text-success';
    setTimeout(function() { icon.className = 'bi bi-clipboard'; }, 1500);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(showCheck);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCheck();
  }
});
</script>
</body>
</html>
