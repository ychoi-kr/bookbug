<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}bookbug{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    [data-bs-theme="dark"] body { background: #212529; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .issue-row:hover { background: #f0f4ff; cursor: pointer; }
    [data-bs-theme="dark"] .issue-row:hover { background: #2c3e50; }
    .badge-status, .badge-severity { font-size: .75rem; }
    .filter-bar { background: #fff; border-bottom: 1px solid #dee2e6; }
    [data-bs-theme="dark"] .filter-bar { background: #2b3035; border-bottom-color: #495057; }
    .history-entry { border-left: 3px solid #dee2e6; padding-left: .75rem; }
    .field-label { font-size: .75rem; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; }
    textarea { font-family: inherit; }
    .stat-card { min-width: 80px; text-align: center; }
    .stat-num  { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .stat-lbl  { font-size: .7rem; color: #6c757d; }
    #theme-btn { font-size: .85rem; padding: .25rem .6rem; }
  </style>
  <script>
    // 페이지 로드 전 테마 적용 (깜빡임 방지)
    (function() {
      const saved = localStorage.getItem('bb-theme') || 'auto';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const dark = saved === 'dark' || (saved === 'auto' && prefersDark);
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-0">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🐛 bookbug</a>
    <div class="navbar-nav ms-auto align-items-center gap-2">
      <a class="nav-link" href="/">프로젝트</a>
      <button id="theme-btn" class="btn btn-outline-secondary btn-sm" title="테마 전환"></button>
    </div>
  </div>
</nav>
<div class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const ICONS = { light: '☀️ 라이트', dark: '🌙 다크', auto: '🖥️ 시스템' };
  const CYCLE = { light: 'dark', dark: 'auto', auto: 'light' };

  function applyTheme(mode) {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const dark = mode === 'dark' || (mode === 'auto' && prefersDark);
    document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = ICONS[mode];
  }

  let currentMode = localStorage.getItem('bb-theme') || 'auto';
  applyTheme(currentMode);

  document.getElementById('theme-btn').addEventListener('click', function() {
    currentMode = CYCLE[currentMode];
    localStorage.setItem('bb-theme', currentMode);
    applyTheme(currentMode);
  });

  // 시스템 테마 변경 실시간 반영 (auto 모드일 때)
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (localStorage.getItem('bb-theme') === 'auto') applyTheme('auto');
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
